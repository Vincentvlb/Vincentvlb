<svg width="1200" height="430" viewBox="0 0 1200 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img"
    aria-labelledby="title description">
    <title id="title">Engineering capabilities</title>

    <desc id="description">
        End-to-end robotics engineering capabilities, from electronics
        and embedded firmware to AI, software and industrialization.
    </desc>

    <defs>
        <linearGradient id="background" x1="0" y1="0" x2="1200" y2="430" gradientUnits="userSpaceOnUse">
            <stop stop-color="#0D1117" />
            <stop offset="1" stop-color="#161B22" />
        </linearGradient>

        <linearGradient id="accent" x1="80" y1="0" x2="1120" y2="0" gradientUnits="userSpaceOnUse">
            <stop stop-color="#58A6FF" />
            <stop offset="0.5" stop-color="#A371F7" />
            <stop offset="1" stop-color="#3FB950" />
        </linearGradient>

        <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="6" result="blur" />

            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <style>
        .capability-box {
            fill: #161b22;
            stroke: #30363d;
            stroke-width: 2;
            transition:
                stroke 0.25s ease,
                fill 0.25s ease,
                filter 0.25s ease;
        }

        .capability-title {
            fill: #f0f6fc;
            font-family: Inter, "Segoe UI", Arial, sans-serif;
            font-size: 18px;
            font-weight: 700;
            text-anchor: middle;
        }

        .capability-subtitle {
            fill: #8b949e;
            font-family:
                ui-monospace,
                SFMono-Regular,
                Menlo,
                Monaco,
                Consolas,
                monospace;
            font-size: 13px;
            text-anchor: middle;
        }

        .capability-icon {
            fill: #58a6ff;
            font-family: "Segoe UI Emoji", "Apple Color Emoji", sans-serif;
            font-size: 27px;
            text-anchor: middle;
        }

        .capability:hover .capability-box {
            fill: #1f2937;
            stroke: #58a6ff;
            filter: url(#glow);
        }

        .capability:hover .capability-icon {
            fill: #79c0ff;
        }

        @media (prefers-reduced-motion: reduce) {
            .capability-box {
                transition: none;
            }
        }
    </style>

    <!-- Background -->

    <rect width="1200" height="430" rx="28" fill="url(#background)" />

    <rect x="1" y="1" width="1198" height="428" rx="27" stroke="#30363D" stroke-width="2" />

    <!-- Header -->

    
<text x="70" y="58" fill="#8B949E"
    font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="22">
    &gt; engineering_capabilities
</text>

<text x="70" y="108" fill="url(#accent)" font-family="Inter, Segoe UI, Arial, sans-serif"
    font-size="34" font-weight="700">
    End-to-end robotics engineering
</text>


    <!-- Capabilities -->

    <g class="capability">
        <rect class="capability-box" x="70" y="150" width="160" height="140" rx="18" />

        <text class="capability-icon" x="150" y="195">⚡</text>

        <text class="capability-title" x="150" y="232">
            Electronics
        </text>

        <text class="capability-subtitle" x="150" y="260">
            PCB · Power
        </text>
    </g>

    <g class="capability">
        <rect class="capability-box" x="250" y="150" width="160" height="140" rx="18" />

        <text class="capability-icon" x="330" y="195">⚙️</text>

        <text class="capability-title" x="330" y="232">
            Firmware
        </text>

        <text class="capability-subtitle" x="330" y="260">
            STM32 · Real-time
        </text>
    </g>

    <g class="capability">
        <rect class="capability-box" x="430" y="150" width="160" height="140" rx="18" />

        <text class="capability-icon" x="510" y="195">👁</text>

        <text class="capability-title" x="510" y="232">
            Vision
        </text>

        <text class="capability-subtitle" x="510" y="260">
            Cameras · Imaging
        </text>
    </g>

    <g class="capability">
        <rect class="capability-box" x="610" y="150" width="160" height="140" rx="18" />

        <text class="capability-icon" x="690" y="195">🧠</text>

        <text class="capability-title" x="690" y="232">
            AI inference
        </text>

        <text class="capability-subtitle" x="690" y="260">
            YOLO · TensorRT
        </text>
    </g>

    <g class="capability">
        <rect class="capability-box" x="790" y="150" width="160" height="140" rx="18" />

        <text class="capability-icon" x="870" y="195">☁️</text>

        <text class="capability-title" x="870" y="232">
            Software
        </text>

        <text class="capability-subtitle" x="870" y="260">
            Backend · Apps
        </text>
    </g>

    <g class="capability">
        <rect class="capability-box" x="970" y="150" width="160" height="140" rx="18" />

        <text class="capability-icon" x="1050" y="195">🏭</text>

        <text class="capability-title" x="1050" y="232">
            Industrialization
        </text>

        <text class="capability-subtitle" x="1050" y="260">
            Product · Production
        </text>
    </g>

    <!-- Mission -->

    <line x1="70" y1="328" x2="1130" y2="328" stroke="#30363D" stroke-width="2" />

    <text x="70" y="365" fill="#8B949E" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
        font-size="16">
        MISSION
    </text>

    <text x="70" y="398" fill="#C9D1D9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21">
        Design and build complete robotic products, from system architecture to industrial deployment.
    </text>
</svg>